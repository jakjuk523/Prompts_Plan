<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Hub — Premium Edition</title>
    <style>
        :root {
            --bg-color: #060709;
            --card-bg: #111318;
            --card-bg-hover: #161920;
            --border-color: #1f242f;
            --border-color-hover: #313849;
            
            --text-main: #f3f4f6;
            --text-muted: #8e96a3;
            --text-accent: #a855f7;
            
            --grad-start: #8b5cf6;
            --grad-end: #3b82f6;
            
            --status-not-sent: #3b82f6;
            --status-queue: #eab308;
            --status-sent: #10b981;
            
            --danger-color: #ef4444;
            --sidebar-width: 280px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* SIDEBAR В СТИЛЕ PREMIUM */
        .sidebar {
            width: var(--sidebar-width);
            background-color: rgba(17, 19, 24, 0.75);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            z-index: 10;
        }

        .sidebar-brand {
            padding: 32px 24px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #c084fc, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border-color);
        }

        .sidebar-menu {
            flex: 1;
            padding: 24px 16px;
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-item:hover {
            color: var(--text-main);
            background-color: var(--card-bg-hover);
        }

        .menu-item.active {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.15), rgba(59, 130, 246, 0.15));
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #c084fc;
        }

        .menu-item svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* MAIN MAIN MAIN */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 48px;
            max-width: 1400px;
            width: calc(100% - var(--sidebar-width));
        }

        /* BREADCRUMBS */
        .breadcrumbs {
            margin-bottom: 16px;
            font-size: 0.9rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }
        .breadcrumbs span {
            cursor: pointer;
            transition: color 0.2s;
        }
        .breadcrumbs span:hover {
            color: #c084fc;
        }

        /* HEADER AREA */
        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            gap: 20px;
            flex-wrap: wrap;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .page-title span {
            background: linear-gradient(135deg, #a855f7, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .action-bar {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-container {
            position: relative;
            width: 320px;
        }

        .search-input {
            width: 100%;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px 16px 12px 44px;
            border-radius: 12px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: var(--text-accent);
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
        }

        .search-container svg {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            fill: var(--text-muted);
        }

        /* PREMIUM GRADIENT BUTTONS */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            outline: none;
            transition: all 0.25s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px rgba(139, 92, 246, 0.45);
        }

        .btn-secondary {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover {
            background-color: var(--card-bg-hover);
            border-color: var(--border-color-hover);
        }

        /* GRID SYSTEM */
        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 28px;
        }

        /* CARDS В СТИЛЕ СКРИНШОТА */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 28px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 230px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.05), rgba(59, 130, 246, 0.05));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--border-color-hover);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .card:hover::before {
            opacity: 1;
        }

        .project-card {
            cursor: pointer;
        }

        .card-header-zone {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
            position: relative;
            z-index: 2;
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-main);
            word-break: break-word;
            line-height: 1.4;
        }

        .card-date {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 14px;
            position: relative;
            z-index: 2;
        }

        .card-desc {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
            margin-bottom: 20px;
            position: relative;
            z-index: 2;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
            font-size: 0.85rem;
            color: var(--text-muted);
            position: relative;
            z-index: 2;
        }

        .prompt-count-tag {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 600;
            color: #c084fc;
        }

        .btn-group {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background-color: var(--card-bg-hover);
            color: var(--text-main);
        }
        .action-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        .edit-btn:hover { color: var(--status-queue); }
        .download-btn:hover { color: var(--status-not-sent); }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }
        .delete-btn:hover {
            color: var(--danger-color);
        }

        /* СТИЛЬНЫЙ СЕЛЕКТОР СТАТУСОВ */
        .status-select-container {
            margin: 12px 0 18px 0;
            position: relative;
            z-index: 3;
        }

        .status-select {
            background-color: #161920;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            outline: none;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }
        .status-select:focus {
            border-color: var(--text-accent);
        }

        /* MODALS */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .modal {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 100%;
            max-width: 580px;
            padding: 36px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            background-color: #060709;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            width: 100%;
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--text-accent);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
        }

        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 14px;
            margin-top: 8px;
        }

        /* TOAST */
        .toast {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 16px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.95rem;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
            display: none;
            z-index: 200;
            animation: slideIn 0.3c cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideIn {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .hidden-file-input { display: none; }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-brand">Prompt<span>Hub</span></div>
        <ul class="sidebar-menu">
            <li class="menu-item active" onclick="goHome()">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
                Главный Хаб
            </li>
            <li class="menu-item" onclick="triggerImport()">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/></svg>
                Импорт бэкапа
            </li>
            <li class="menu-item" onclick="exportFullBackup()">
                <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                Экспорт бэкапа
            </li>
        </ul>
    </div>

    <!-- MAIN MAIN MAIN -->
    <div class="main-content">
        <div class="breadcrumbs" id="breadcrumbs" onclick="goHome()">
            <span>All Projects</span>
        </div>

        <div class="header-area">
            <div class="page-title" id="page-title">Prompt<span>Hub</span></div>
            <div class="action-bar">
                <div class="search-container">
                    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                    <input type="text" id="search-bar" class="search-input" placeholder="Поиск по названию или тексту..." oninput="render()">
                </div>
                <button class="btn btn-primary" id="btn-add-project" onclick="openNewProjectModal()">+ Новый проект</button>
                <button class="btn btn-primary" id="btn-add-prompt" onclick="openNewPromptModal()" style="display: none;">+ Новый промпт</button>
            </div>
        </div>

        <div class="content-grid" id="content-grid"></div>
    </div>

    <!-- MODAL PROJECT -->
    <div class="modal-overlay" id="project-modal" onclick="closeModal('project-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title" id="project-modal-title">Создать новый проект</div>
            <input type="hidden" id="edit-project-id">
            <div class="form-group">
                <label>Дата проекта</label>
                <input type="text" id="project-date" class="form-control">
            </div>
            <div class="form-group">
                <label>Название проекта *</label>
                <input type="text" id="project-name" class="form-control" placeholder="Например: Скрипты генерации контента">
            </div>
            <div class="form-group">
                <label>Описание проекта</label>
                <textarea id="project-description" class="form-control" placeholder="Краткое описание целей и задач..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('project-modal')">Отмена</button>
                <button class="btn btn-primary" onclick="saveProject()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- MODAL PROMPT -->
    <div class="modal-overlay" id="prompt-modal" onclick="closeModal('prompt-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-title" id="prompt-modal-title">Создать новый промпт</div>
            <input type="hidden" id="edit-prompt-id">
            <div class="form-group">
                <label>Дата изменения</label>
                <input type="text" id="prompt-date" class="form-control">
            </div>
            <div class="form-group">
                <label>Привязать к проекту</label>
                <select id="prompt-project-select" class="form-control"></select>
            </div>
            <div class="form-group">
                <label>Название промпта *</label>
                <input type="text" id="prompt-name" class="form-control" placeholder="Например: Анализ конкурентов">
            </div>
            <div class="form-group">
                <label>Описание</label>
                <textarea id="prompt-description" class="form-control" placeholder="Для чего предназначен этот промпт..."></textarea>
            </div>
            <div class="form-group">
                <label>Инструкция (Тело промпта) *</label>
                <textarea id="prompt-text" class="form-control" style="min-height: 180px;" placeholder="Вставьте системные инструкции для ИИ..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="closeModal('prompt-modal')">Отмена</button>
                <button class="btn btn-primary" onclick="savePrompt()">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- UTILS -->
    <input type="file" id="import-file-input" class="hidden-file-input" accept=".json" onchange="importFromFile(event)">
    <div class="toast" id="toast-notify">Успешно выполнено!</div>

    <script>
        let projects = JSON.parse(localStorage.getItem('hub_projects')) || [];
        let prompts = JSON.parse(localStorage.getItem('hub_prompts')) || [];
        let currentProjectId = null;

        window.addEventListener('DOMContentLoaded', () => {
            updateProjectSelect();
            render();
        });

        function getTodayDateString() {
            const today = new Date();
            const yyyy = today.getFullYear();
            let mm = today.getMonth() + 1;
            let dd = today.getDate();
            if (dd < 10) dd = '0' + dd;
            if (mm < 10) mm = '0' + mm;
            return dd + '.' + mm + '.' + yyyy;
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function showToast(message, bgColor = "linear-gradient(135deg, #10b981, #059669)") {
            const toast = document.getElementById('toast-notify');
            toast.innerText = message;
            toast.style.background = bgColor;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        function copyText(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Промпт скопирован в буфер обмена!");
            }).catch(() => {
                showToast("Ошибка при копировании", "linear-gradient(135deg, #ef4444, #dc2626)");
            });
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function goHome() { currentProjectId = null; document.getElementById('search-bar').value = ''; render(); }
        function selectProject(id) { currentProjectId = id; document.getElementById('search-bar').value = ''; render(); }

        function updateProjectSelect() {
            let noProjectExists = projects.some(p => p.id === "no_project_id");
            if (!noProjectExists) {
                projects.unshift({
                    id: "no_project_id",
                    name: "Без проекта",
                    desc: "Сюда автоматически группируются промпты без явного проекта",
                    date: getTodayDateString()
                });
                localStorage.setItem('hub_projects', JSON.stringify(projects));
            }

            const select = document.getElementById('prompt-project-select');
            select.innerHTML = '<option value="--НЕ ВЫБРАН—">--НЕ ВЫБРАН—</option>';
            projects.forEach(p => {
                select.innerHTML += `<option value="${p.id}">${escapeHtml(p.name)}</option>`;
            });
        }

        function render() {
            const grid = document.getElementById('content-grid');
            const search = document.getElementById('search-bar').value.toLowerCase().trim();
            grid.innerHTML = '';

            if (currentProjectId === null) {
                document.getElementById('breadcrumbs').style.visibility = 'hidden';
                document.getElementById('btn-add-prompt').style.display = 'none';
                document.getElementById('btn-add-project').style.display = 'block';
                document.getElementById('page-title').innerHTML = 'Наши <span>Проекты</span>';

                const filteredProjects = projects.filter(p => 
                    (p.name || '').toLowerCase().includes(search) || 
                    (p.desc || '').toLowerCase().includes(search)
                );

                filteredProjects.forEach(p => {
                    const count = prompts.filter(pr => pr.projectId === p.id).length;
                    const card = document.createElement('div');
                    card.className = 'card project-card';
                    card.onclick = () => selectProject(p.id);
                    card.innerHTML = `
                        <div>
                            <div class="card-header-zone">
                                <div class="card-title">${escapeHtml(p.name)}</div>
                                <div class="btn-group">
                                    <button class="action-btn edit-btn" onclick="openEditProject('${p.id}', event)" title="Редактировать">
                                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                    </button>
                                    <button class="action-btn download-btn" onclick="exportSingleProject('${p.id}', '${escapeHtml(p.name)}', event)" title="Скачать JSON проекта">
                                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="card-date">Создан: ${escapeHtml(p.date || '—')}</div>
                            <div class="card-desc">${escapeHtml(p.desc || 'Нет описания.')}</div>
                        </div>
                        <div class="card-footer">
                            <span class="prompt-count-tag">Промптов: ${count}</span>
                            ${p.id !== 'no_project_id' ? `<button class="delete-btn" onclick="deleteProject('${p.id}', event)">Удалить</button>` : ''}
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } else {
                const activeProj = projects.find(p => p.id === currentProjectId);
                const projName = activeProj ? activeProj.name : "Без проекта";

                document.getElementById('breadcrumbs').style.visibility = 'visible';
                document.getElementById('breadcrumbs').innerHTML = '<span>&larr; Вернуться к проектам</span>';
                document.getElementById('btn-add-prompt').style.display = 'block';
                document.getElementById('btn-add-project').style.display = 'none';
                document.getElementById('page-title').innerHTML = `Проект: <span>${escapeHtml(projName)}</span>`;

                const relativePrompts = prompts.filter(p => p.projectId === currentProjectId);
                const filteredPrompts = relativePrompts.filter(p => 
                    (p.name || '').toLowerCase().includes(search) || 
                    (p.desc || '').toLowerCase().includes(search) ||
                    (p.text || '').toLowerCase().includes(search)
                );

                filteredPrompts.forEach((p, index) => {
                    const cardNumber = index + 1;
                    const card = document.createElement('div');
                    card.className = 'card prompt-card';
                    card.onclick = () => copyText(p.text);
                    
                    const currentStatus = p.status || 'не отправлено';

                    card.innerHTML = `
                        <div>
                            <div class="card-header-zone">
                                <div class="card-title" style="display:flex; align-items:center; gap:10px;">
                                    <span style="color: #c084fc; font-family: monospace; font-size:1.25rem; font-weight:900;">#${cardNumber}</span>
                                    <span>${escapeHtml(p.name)}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="action-btn edit-btn" onclick="openEditPrompt('${p.id}', event)" title="Редактировать">
                                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                                    </button>
                                    <button class="action-btn download-btn" onclick="exportSinglePrompt('${p.id}', '${escapeHtml(p.name)}', event)" title="Скачать JSON промпта">
                                        <svg viewBox="0 0 24 24"><path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/></svg>
                                    </button>
                                </div>
                            </div>
                            <div class="card-date">Обновлен: ${escapeHtml(p.date || '—')}</div>
                            
                            <div class="status-select-container" onclick="event.stopPropagation()">
                                <select class="status-select" onchange="updatePromptStatus('${p.id}', this.value)">
                                    <option value="не отправлено" ${currentStatus === 'не отправлено' ? 'selected' : ''}>🔵 не отправлено</option>
                                    <option value="В очереди" ${currentStatus === 'В очереди' ? 'selected' : ''}>🟡 В очереди</option>
                                    <option value="Отправлено" ${currentStatus === 'Отправлено' ? 'selected' : ''}>🟢 Отправлено</option>
                                </select>
                            </div>

                            <div class="card-desc">${escapeHtml(p.desc || 'Нет описания.')}</div>
                        </div>
                        <div class="card-footer">
                            <span>Кликните для быстрого копирования</span>
                            <button class="delete-btn" onclick="deletePrompt('${p.id}', event)">Удалить</button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function updatePromptStatus(promptId, newStatus) {
            const prompt = prompts.find(p => p.id === promptId);
            if (prompt) {
                prompt.status = newStatus;
                localStorage.setItem('hub_prompts', JSON.stringify(prompts));
                showToast(`Статус изменен на "${newStatus}"`, "linear-gradient(135deg, #3b82f6, #1d4ed8)");
            }
        }

        function openNewProjectModal() {
            document.getElementById('edit-project-id').value = '';
            document.getElementById('project-modal-title').innerText = 'Создать новый проект';
            document.getElementById('project-date').value = getTodayDateString();
            document.getElementById('project-name').value = '';
            document.getElementById('project-description').value = '';
            openModal('project-modal');
        }

        function openEditProject(id, event) {
            event.stopPropagation();
            const p = projects.find(item => item.id === id);
            if (!p) return;
            document.getElementById('edit-project-id').value = p.id;
            document.getElementById('project-modal-title').innerText = 'Редактировать проект';
            document.getElementById('project-date').value = p.date || getTodayDateString();
            document.getElementById('project-name').value = p.name || '';
            document.getElementById('project-description').value = p.desc || '';
            openModal('project-modal');
        }

        function saveProject() {
            const id = document.getElementById('edit-project-id').value;
            const date = document.getElementById('project-date').value.trim() || getTodayDateString();
            const name = document.getElementById('project-name').value.trim();
            const desc = document.getElementById('project-description').value.trim();

            if (!name) { alert("Укажите имя проекта!"); return; }

            if (id) {
                const p = projects.find(item => item.id === id);
                if (p) { p.date = date; p.name = name; p.desc = desc; }
            } else {
                projects.push({
                    id: 'project_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    date: date,
                    name: name,
                    desc: desc
                });
            }

            localStorage.setItem('hub_projects', JSON.stringify(projects));
            closeModal('project-modal');
            updateProjectSelect();
            render();
            showToast("Проект успешно сохранен!");
        }

        function deleteProject(id, event) {
            event.stopPropagation();
            if (id === 'no_project_id') return;
            if (confirm("Удалить данный проект? Входящие в него промпты переместятся в категорию 'Без проекта'.")) {
                prompts.forEach(p => { if (p.projectId === id) p.projectId = 'no_project_id'; });
                projects = projects.filter(item => item.id !== id);
                localStorage.setItem('hub_projects', JSON.stringify(projects));
                localStorage.setItem('hub_prompts', JSON.stringify(prompts));
                updateProjectSelect();
                render();
                showToast("Проект удален.", "linear-gradient(135deg, #ef4444, #dc2626)");
            }
        }

        function openNewPromptModal() {
            document.getElementById('edit-prompt-id').value = '';
            document.getElementById('prompt-modal-title').innerText = 'Создать новый промпт';
            document.getElementById('prompt-date').value = getTodayDateString();
            document.getElementById('prompt-project-select').value = currentProjectId || 'no_project_id';
            document.getElementById('prompt-name').value = '';
            document.getElementById('prompt-description').value = '';
            document.getElementById('prompt-text').value = '';
            openModal('prompt-modal');
        }

        function openEditPrompt(id, event) {
            event.stopPropagation();
            const p = prompts.find(item => item.id === id);
            if (!p) return;
            document.getElementById('edit-prompt-id').value = p.id;
            document.getElementById('prompt-modal-title').innerText = 'Редактировать промпт';
            document.getElementById('prompt-date').value = p.date || getTodayDateString();
            document.getElementById('prompt-project-select').value = p.projectId || 'no_project_id';
            document.getElementById('prompt-name').value = p.name || '';
            document.getElementById('prompt-description').value = p.desc || '';
            document.getElementById('prompt-text').value = p.text || '';
            openModal('prompt-modal');
        }

        function savePrompt() {
            const id = document.getElementById('edit-prompt-id').value;
            const date = document.getElementById('prompt-date').value.trim() || getTodayDateString();
            let projectId = document.getElementById('prompt-project-select').value;
            const name = document.getElementById('prompt-name').value.trim();
            const desc = document.getElementById('prompt-description').value.trim();
            const text = document.getElementById('prompt-text').value.trim();

            if (!name || !text) { alert("Заполните обязательные поля!"); return; }

            if (projectId === '--НЕ ВЫБРАН—' || !projectId) { projectId = "no_project_id"; }

            if (id) {
                const promptObj = prompts.find(p => p.id === id);
                if (promptObj) {
                    promptObj.date = date;
                    promptObj.projectId = projectId;
                    promptObj.name = name;
                    promptObj.desc = desc;
                    promptObj.text = text;
                }
            } else {
                prompts.push({
                    id: 'prompt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    date: date,
                    projectId: projectId,
                    name: name,
                    desc: desc,
                    text: text,
                    status: 'не отправлено'
                });
            }

            localStorage.setItem('hub_prompts', JSON.stringify(prompts));
            closeModal('prompt-modal');
            render();
            showToast("Промпт сохранен!");
        }

        function deletePrompt(id, event) {
            event.stopPropagation();
            if (confirm("Вы уверены, что хотите безвозвратно удалить промпт?")) {
                prompts = prompts.filter(p => p.id !== id);
                localStorage.setItem('hub_prompts', JSON.stringify(prompts));
                render();
                showToast("Промпт удален.", "linear-gradient(135deg, #ef4444, #dc2626)");
            }
        }

        function downloadJSON(filename, data) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        function exportFullBackup() {
            downloadJSON(`prompthub_full_backup_${getTodayDateString()}.json`, { projects, prompts });
            showToast("Полный бэкап сохранен!");
        }

        function exportSingleProject(projId, projName, event) {
            event.stopPropagation();
            const pObj = projects.find(p => p.id === projId);
            const relative = prompts.filter(p => p.projectId === projId);
            downloadJSON(`project_${projName.replace(/\s+/g, '_')}_backup.json`, { type: "single_project", project: pObj, prompts: relative });
            showToast("Проект экспортирован!");
        }

        function exportSinglePrompt(promptId, promptName, event) {
            event.stopPropagation();
            const pObj = prompts.find(p => p.id === promptId);
            downloadJSON(`prompt_${promptName.replace(/\s+/g, '_')}_backup.json`, { type: "single_prompt", prompt: pObj });
            showToast("Промпт экспортирован!");
        }

        function triggerImport() { document.getElementById('import-file-input').click(); }

        function importFromFile(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);

                    if (imported.projects && imported.prompts && !imported.type) {
                        if (confirm("Импортировать все данные как новые дубликаты? Текущие данные не затрутся.")) {
                            const projectIdMap = {};
                            imported.projects.forEach(p => {
                                if (p.id === 'no_project_id') { projectIdMap[p.id] = 'no_project_id'; return; }
                                const newId = 'project_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                                projectIdMap[p.id] = newId;
                                projects.push({ ...p, id: newId });
                            });
                            imported.prompts.forEach(p => {
                                prompts.push({
                                    ...p,
                                    id: 'prompt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                                    projectId: projectIdMap[p.projectId] || p.projectId || "no_project_id",
                                    status: p.status || 'не отправлено'
                                });
                            });
                            saveAndRefreshAll("Данные импортированы как дубликаты!");
                        }
                    } else if (imported.type === "single_project" && imported.project && imported.prompts) {
                        const newProjId = 'project_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                        projects.push({ ...imported.project, id: newProjId, name: imported.project.name + " (Копия)" });
                        imported.prompts.forEach(p => {
                            prompts.push({
                                ...p,
                                id: 'prompt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                                projectId: newProjId,
                                status: p.status || 'не отправлено'
                            });
                        });
                        saveAndRefreshAll("Проект импортирован как дубликат!");
                    } else if (imported.type === "single_prompt" && imported.prompt) {
                        prompts.push({
                            ...imported.prompt,
                            id: 'prompt_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                            projectId: currentProjectId || "no_project_id",
                            name: imported.prompt.name + " (Копия)",
                            status: imported.prompt.status || 'не отправлено'
                        });
                        saveAndRefreshAll("Промпт импортирован как дубликат!");
                    } else {
                        alert("Неподдерживаемый формат бэкапа.");
                    }
                } catch (err) {
                    alert("Ошибка чтения JSON.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        function saveAndRefreshAll(msg) {
            localStorage.setItem('hub_projects', JSON.stringify(projects));
            localStorage.setItem('hub_prompts', JSON.stringify(prompts));
            updateProjectSelect();
            render();
            showToast(msg);
        }
    </script>
</body>
</html>
